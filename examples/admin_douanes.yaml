# admin_douanes.yaml
name: "Administration des Douanes"
description: "Profil custom pour les services douaniers"
detectors:
  - type: "regex"
    name: "douanes_pii"
    config:
      anssi_ref: "R25"
      action: "block"
      patterns:
        "NUM_DECLARATION": '(?i)DECL-[A-Z0-9]{8}'
        "CODE_DOUANE": '\d{4}[A-Z]{2}'
  - type: "topic"
    name: "perimetre_douanes"
    config:
      anssi_ref: "R26"
      action: "warn"
      extra:
        allowed: ["import", "export", "taxe", "douane", "frontière", "marchandise"]
        blocked: ["politique", "religion", "crypto-monnaie"]
