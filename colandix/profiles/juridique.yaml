name: "Juridique"
description: "Profil conformité pour les professions juridiques"
version: "1.0"
anssi_refs: ["R25", "R26", "R29"]
detectors:
  - type: regex
    name: "pii_entreprise"
    action: block
    weight: 0.9
    anssi_ref: "R25"
    extra:
      patterns: ["SIRET", "IBAN_FR", "EMAIL"]

  - type: regex
    name: "clauses_sensibles"
    action: block
    weight: 0.7
    anssi_ref: "R25"
    extra:
      custom_patterns:
        CONFIDENTIEL: "\\b(confidentiel|secret des affaires|nda|accord de confidentialit[eé])\\b"
        REF_DOSSIER: "\\b(dossiers?|affaires?)\\.?\\s*n[°o]?\\s*[0-9A-Z\\-]{4,}\\b"

  - type: injection
    name: "prompt_injection"
    action: block
    weight: 1.0
    anssi_ref: "R25"

  - type: entropy
    name: "secrets_techniques"
    action: block
    weight: 0.8
    anssi_ref: "R25"
